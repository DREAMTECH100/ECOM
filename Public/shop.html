<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ECOM - Shop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <div class="logo">ECOM</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="shop.html" class="active">Shop</a>
      <a href="cart.html">Cart 🛒</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <section class="shop-hero">
    <h1>Explore Products</h1>
    <p>Find what you need from our wide range of items</p>
    <input type="text" placeholder="Search products..." id="searchInput" />
  </section>

  <main class="shop-container">
    <aside class="filter-sidebar">
      <h3>Filters</h3>
      <label><input type="checkbox" /> Men</label>
      <label><input type="checkbox" /> Women</label>
      <label><input type="checkbox" /> Electronics</label>
      <label><input type="checkbox" /> Home</label>
      <label><input type="checkbox" /> Price under $50</label>
    </aside>

    <section class="product-list">
      <div class="product-card animate">
        <img src="https://via.placeholder.com/200" alt="Product 1">
        <h3>Elegant Watch</h3>
        <p>$79</p>
        <a href="product.html" class="view-btn">View Product</a>
      </div>
      <div class="product-card animate">
        <img src="https://via.placeholder.com/200" alt="Product 2">
        <h3>Smartphone X</h3>
        <p>$499</p>
        <a href="product.html" class="view-btn">View Product</a>
      </div>
      <div class="product-card animate">
        <img src="https://via.placeholder.com/200" alt="Product 3">
        <h3>Wireless Headset</h3>
        <p>$120</p>
        <a href="product.html" class="view-btn">View Product</a>
      </div>
      <div class="product-card animate">
        <img src="https://via.placeholder.com/200" alt="Product 4">
        <h3>Running Sneakers</h3>
        <p>$60</p>
        <a href="product.html" class="view-btn">View Product</a>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2025 ECOM. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
