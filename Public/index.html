<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ECOM - Home</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <div class="logo">ECOM</div>
    <nav>
      <a href="#">Home</a>
      <a href="shop.html">Shop</a>
      <a href="login.html">Login</a>
      <a href="cart.html">Cart 🛒</a>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-text">
      <h1>Welcome to ECOM</h1>
      <p>Your ultimate shopping destination</p>
      <button id="shopNowBtn">Shop Now</button>
    </div>
  </section>

  <section class="featured-products">
    <h2>Featured Products</h2>
    <div class="product-grid">
      <div class="product-card animate">
        <img src="https://via.placeholder.com/200" alt="Product 1">
        <h3>Product 1</h3>
        <p>$25</p>
      </div>
      <div class="product-card animate">
        <img src="https://via.placeholder.com/200" alt="Product 2">
        <h3>Product 2</h3>
        <p>$40</p>
      </div>
      <div class="product-card animate">
        <img src="https://via.placeholder.com/200" alt="Product 3">
        <h3>Product 3</h3>
        <p>$60</p>
      </div>
    </div>
  </section>

  <footer>
    <p>© 2025 ECOM. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
