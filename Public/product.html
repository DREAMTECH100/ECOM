<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ECOM - Product Details</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <div class="logo">ECOM</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="cart.html">Cart 🛒</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <main class="product-page">
    <section class="product-detail animate">
      <div class="product-images">
        <img src="https://via.placeholder.com/400" alt="Product" id="mainImage">
        <div class="thumbs">
          <img src="https://via.placeholder.com/100" onclick="switchImage(this)">
          <img src="https://via.placeholder.com/100/111" onclick="switchImage(this)">
          <img src="https://via.placeholder.com/100/222" onclick="switchImage(this)">
        </div>
      </div>
      <div class="product-info">
        <h1>Smartphone X</h1>
        <p class="price">$499</p>
        <div class="quantity">
          <button onclick="updateQty(-1)">-</button>
          <input type="number" value="1" id="qtyInput" readonly>
          <button onclick="updateQty(1)">+</button>
        </div>
        <button class="add-to-cart" onclick="addToCart()">Add to Cart</button>

        <div class="tabs">
          <button class="tab-btn active" onclick="switchTab('desc')">Description</button>
          <button class="tab-btn" onclick="switchTab('reviews')">Reviews</button>
        </div>
        <div class="tab-content" id="descTab">
          <p>This Smartphone X is the latest model with blazing speed, crisp display, and long battery life. Ideal for both professionals and casual users.</p>
        </div>
        <div class="tab-content" id="reviewsTab" style="display: none;">
          <p>No reviews yet. Be the first to leave one!</p>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2025 ECOM. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
